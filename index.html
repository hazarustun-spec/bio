<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hazar — Links</title>
  <meta name="theme-color" content="#000000" />
  <style>
    /* ---- Base ---- */
    :root{
      --bg:#000;
      --fg:#f4f4f4;
      --muted:rgba(244,244,244,.65);
      --hair:rgba(244,244,244,.18);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      /* classy serif stack (no external font needed) */
      font-family: "Iowan Old Style","Palatino Linotype",Palatino,"Cormorant Garamond","Garamond",Georgia,serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x:hidden;
    }

    /* safe-area for iPhone notch */
    .safe{
      padding:
        max(18px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));
      min-height:100svh;
      position:relative;
      display:flex;
      align-items:center;
    }

    /* ---- Top bar ---- */
    .brand{
      position:absolute;
      top:max(14px, env(safe-area-inset-top));
      left:max(14px, env(safe-area-inset-left));
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--muted);
      user-select:none;
    }
    .close{
      position:absolute;
      top:max(10px, env(safe-area-inset-top));
      right:max(10px, env(safe-area-inset-right));
      width:44px;height:44px;
      border:0;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      display:grid;
      place-items:center;
    }
    .close:hover{color:var(--fg)}
    .close svg{width:18px;height:18px}

    /* ---- Menu ---- */
    .wrap{
      width:min(820px, 100%);
    }
    nav{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-top:24px;
    }
    .item{
      display:inline-flex;
      align-items:flex-end;
      gap:12px;
      text-decoration:none;
      color:var(--fg);
      line-height:0.95;
      font-weight:500;
      font-size: clamp(52px, 10vw, 92px);
      letter-spacing:-0.02em;
      position:relative;
      width:fit-content;
      padding:2px 0;
      transition: transform .12s ease, opacity .12s ease;
    }
    .item:active{transform:scale(.99)}
    .item::after{
      content:"";
      position:absolute;
      left:0; bottom:-10px;
      width:100%;
      height:1px;
      background:var(--hair);
      transform:scaleX(0);
      transform-origin:left;
      transition: transform .22s ease;
    }
    .item:hover::after{transform:scaleX(1)}

    /* optional small caption under menu */
    .hint{
      margin-top:22px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      font-size:13px;
      color:var(--muted);
      letter-spacing:.02em;
    }

    /* subtle fade-in */
    .fade{
      animation: in .35s ease both;
    }
    @keyframes in{
      from{opacity:0; transform: translateY(8px);}
      to{opacity:1; transform: translateY(0);}
    }
  </style>
</head>

<body>
  <div class="safe">
    <!-- sol üst marka -->
    <div class="brand">PER—SONA®</div>

    <!-- sağ üst kapat (instagram in-app browser’da geri git) -->
    <button class="close" aria-label="Close" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>

    <div class="wrap fade">
      <nav>
        <!-- ✅ Dış link yapmak istersen href="https://..." yap -->
        <!-- ✅ Sayfa içi bölüm istersen href="#home" gibi kullan -->
        <a class="item" href="https://hazarustun.com" target="_blank" rel="noopener">Home</a>
        <a class="item" href="https://hazarustun.com/projects" target="_blank" rel="noopener">Catalogue</a>
        <a class="item" href="https://hazarustun.com/about" target="_blank" rel="noopener">Studio</a>
        <a class="item" href="mailto:youremail@example.com">Contact</a>
      </nav>

      <div class="hint">Tap to open • Minimal bio links</div>
    </div>
  </div>

  <script>
    function goBack(){
      // Instagram in-app browser: çoğu zaman history var
      if (history.length > 1) history.back();
      else window.location.href = "https://instagram.com";
    }
  </script>
</body>
</html>
